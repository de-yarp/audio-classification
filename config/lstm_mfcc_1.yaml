model:
  model_type: lstm
  repr_type: mfcc
  mfcc_deltas: true
  hidden_size: 256
  num_layers: 2
  dropout: 0.45
  bidirectional: true
  pooling: mean
  fc_layers:
    - 256
    - 128
  num_classes: 50


run:
  seed: 42
  folds_train: [2, 3, 4]
  folds_val: [1]
  batch_size: 32
  num_epochs: 80
  optimizer: ADAM
  lr: 0.001
  momentum: null
  weight_decay: 1.0e-4

  scheduler: PLATEAU
  factor: 0.5
  patience: 7
  min_lr: 1.0e-6
  step_size: null
  
  warmup_lr: False
  warmup_epochs: null
  warmup_lr_val: null

  augment: true
  freq_masks: 2
  freq_mask_width: 10
  time_masks: 2
  time_mask_width: 25