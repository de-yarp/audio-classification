model:
  model_type: "cnn"
  repr_type: "mfcc"
  mfcc_deltas: True
  stack_deltas_as_channels: True
  conv_layers:
    - type: "conv"
      kernel_count: 32
      kernel_size: [3, 5]
      stride: 1
      padding: 0
      batch_norm: True
    - type: "pool"
      kernel_size: [1, 2]
      stride: [1, 2]
      padding: 0
    - type: "conv"
      kernel_count: 64
      kernel_size: [3, 5]
      stride: 1
      padding: 0
      batch_norm: True
    - type: "pool"
      kernel_size: [1, 2]
      stride: [1, 2]
      padding: 0
    - type: "conv"
      kernel_count: 96
      kernel_size: [3, 5]
      stride: 1
      padding: 0
      batch_norm: True
    - type: "pool"
      kernel_size: [1, 2]
      stride: [1, 2]
      padding: 0
  pool_type: "max"
  fc_layers:
    - 512
    - 128
  dropout: 0.5
  num_classes: 50
  global_avg_pool: null

run:
  seed: 123
  folds_train: [1, 2, 3]
  folds_val: [4]
  batch_size: 32
  num_epochs: 100

  optimizer: "SGD"
  lr: 0.001
  momentum: 0.9
  weight_decay: 0.01

  warmup_lr: true
  warmup_epochs: 5
  warmup_lr_val: 0.00001

  scheduler: "plateau"
  factor: 0.1
  patience: 5
  min_lr: 0.000001
  step_size: null

  augment: true
  freq_masks: 0
  freq_mask_width: 10
  time_masks: 2
  time_mask_width: 25